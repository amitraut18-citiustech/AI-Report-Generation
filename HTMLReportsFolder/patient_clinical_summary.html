<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patient Clinical Summary Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 10pt;
      color: #212529;
      margin: 0;
      padding: 0;
      background: #fff;
    }
    .report {
      max-width: 8.5in;
      margin: 0 auto;
      padding: 0.5in;
    }

    /* --- Header --- */
    .report__title {
      font-size: 16pt;
      font-weight: bold;
      color: #1f3864;
      margin: 0 0 8px;
    }
    .report__filterform {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
    }
    .report__filterform label {
      display: flex;
      flex-direction: column;
      font-size: 9pt;
      color: #495057;
      gap: 2px;
    }
    .report__filterform input {
      padding: 4px 6px;
      border: 1px solid #ced4da;
      border-radius: 3px;
      font-size: 9pt;
    }
    .report__filterform button {
      padding: 5px 16px;
      background: #1f3864;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 9pt;
      font-weight: 600;
    }
    .report__filterform button:hover { background: #2b4a7e; }
    .report__filters {
      font-style: italic;
      font-size: 9pt;
      color: #595959;
      margin: 4px 0 16px;
    }

    /* --- Section headings --- */
    .section-heading {
      font-size: 12pt;
      font-weight: bold;
      color: #1f3864;
      margin: 20px 0 8px;
    }

    /* --- Tables --- */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 9pt;
    }
    thead th {
      background: #212529;
      color: #fff;
      padding: 6px 8px;
      text-align: left;
      border: 1px solid #495057;
      font-weight: 600;
    }
    thead th.center, td.center { text-align: center; }
    tbody td {
      padding: 5px 8px;
      border: 1px solid #dee2e6;
      vertical-align: top;
    }

    /* --- Facility Summary table --- */
    #facilitySummaryTable tbody tr:nth-child(odd) td { background: #f2f2f2; }
    #facilitySummaryTable tbody tr:nth-child(even) td { background: #fff; }

    /* --- Clinical Detail: group banners --- */
    .facility-banner td {
      background: #dbe5f1;
      color: #1f3864;
      font-weight: bold;
      padding: 8px;
      font-size: 10pt;
      border: 1px solid #b8cce4;
    }
    .patient-banner td {
      font-weight: bold;
      padding: 6px 8px;
      font-size: 9pt;
      border: 1px solid #dee2e6;
    }
    .patient-banner.high-risk td { background: #f8d7da; }
    .patient-banner.low-risk td { background: #d1e7dd; }

    /* --- Clinical Detail: data rows --- */
    .odd-row td { background: #f2f2f2; }
    .even-row td { background: #fff; }
    .inpatient-cell { background: #fff3cd !important; }
    .flag-out { color: #b02a37; font-weight: bold; text-align: center; }
    .flag-ok { color: #0f5132; text-align: center; }
    td.flag-cell { text-align: center; }

    /* --- Facility Summary: conditional --- */
    .out-of-range-highlight { color: #b02a37; font-weight: bold; }

    /* --- Narrative --- */
    .report__narrative {
      margin: 12px 0;
      padding: 0;
      background: #f8f9fa;
      border: 1px solid #e2e6ea;
      border-radius: 6px;
      font-size: 9pt;
      overflow: hidden;
    }
    .report__narrative-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #1f3864;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
    }
    .report__narrative-header svg { flex-shrink: 0; }
    .report__narrative-body {
      padding: 14px 16px;
      line-height: 1.6;
      color: #333;
    }
    .report__narrative-body p { margin: 0 0 8px; }
    .report__narrative-body p:last-child { margin-bottom: 0; }

    /* --- Empty state --- */
    .report__empty {
      text-align: center;
      color: #6c757d;
      padding: 40px 0;
      font-size: 11pt;
    }

    /* --- Footer --- */
    .report__footer {
      display: flex;
      justify-content: flex-start;
      gap: 0;
      margin-top: 24px;
      padding-top: 8px;
      border-top: 1px solid #dee2e6;
      font-size: 8pt;
      color: #6c757d;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    /* --- Print --- */
    @media print {
      body { font-size: 9pt; }
      .report { max-width: none; padding: 0.25in; }
      .report__filterform { display: none; }
      table { page-break-inside: auto; }
      tr { page-break-inside: avoid; }
      .facility-banner { page-break-before: auto; }
      .report__footer { position: fixed; bottom: 0; left: 0; right: 0; }
    }
  </style>
</head>
<body>
  <main class="report" id="report">
    <header class="report__header">
      <h1 class="report__title">Patient Clinical Summary Report</h1>

      <form class="report__filterform" data-filter-form>
        <label>Visit from
          <input type="date" name="fromDate" />
        </label>
        <label>Visit to
          <input type="date" name="toDate" />
        </label>
        <label>Min age
          <input type="number" name="minAge" min="0" max="150" />
        </label>
        <label>Max age
          <input type="number" name="maxAge" min="0" max="150" />
        </label>
        <button type="submit">Apply filters</button>
      </form>

      <p class="report__filters" data-filters></p>
    </header>

    <section class="report__summary" data-summary hidden>
      <h2 class="section-heading">Facility Summary</h2>
      <table class="report__table" id="facilitySummaryTable">
        <thead>
          <tr>
            <th scope="col">Facility</th>
            <th scope="col" class="center"># Patients</th>
            <th scope="col" class="center"># Events</th>
            <th scope="col" class="center">Avg Age</th>
            <th scope="col" class="center">Inpatient Events</th>
            <th scope="col" class="center">Out-of-range Labs</th>
          </tr>
        </thead>
        <tbody data-facility-summary></tbody>
      </table>
    </section>

    <section class="report__narrative" data-narrative hidden></section>

    <section class="report__detail" data-detail hidden>
      <h2 class="section-heading">Clinical Detail by Facility, Patient and Transplant Event</h2>
      <table class="report__table" id="clinicalDetailTable">
        <thead>
          <tr>
            <th scope="col">Event</th>
            <th scope="col">Visit Date</th>
            <th scope="col">Provider</th>
            <th scope="col">Donor</th>
            <th scope="col">Setting</th>
            <th scope="col">Test</th>
            <th scope="col">Result</th>
            <th scope="col">Reference</th>
            <th scope="col" class="center">Flag</th>
          </tr>
        </thead>
        <tbody data-rows></tbody>
      </table>
    </section>

    <p class="report__empty" data-empty hidden>No data available.</p>

    <footer class="report__footer">
      <span data-generated></span>
      <span data-executed-by></span>
    </footer>
  </main>

  <!-- REPORT_DATA -->
  <script src="patient_clinical_summary.js" defer></script>
</body>
</html>
