<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patient Clinical Summary Report</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #555;
      --border: #cfcfcf;
      --title: #1f3864;              /* report title / facility band text */
      --summary-head: #212529;       /* summary + detail column header bg */
      --facility-band: #dbe5f1;      /* facility band row bg */
      --risk-high: #f8d7da;          /* high-risk patient banner (red-subtle) */
      --risk-low: #d1e7dd;           /* normal patient banner (green-subtle) */
      --inpatient: #fff3cd;          /* inpatient setting highlight (yellow) */
      --zebra: #f2f2f2;              /* zebra stripe */
      --oor: #b02a37;                /* out-of-range red */
      --ok: #0f5132;                 /* in-range green */
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
      color: var(--fg);
      margin: 0;
      padding: 1.5rem;
      background: #fff;
      line-height: 1.4;
    }
    .report { max-width: 1200px; margin: 0 auto; }
    .report__title {
      font-size: 16pt;
      font-weight: 700;
      color: var(--title);
      margin: 0 0 0.75rem 0;
    }

    /* Interactive filter form */
    .report__filterform {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 0.75rem;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fafbfc;
      margin-bottom: 0.5rem;
    }
    .report__filterform label {
      display: flex;
      flex-direction: column;
      font-size: 0.8rem;
      color: var(--muted);
      gap: 0.2rem;
    }
    .report__filterform input {
      font: inherit;
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .report__filterform button {
      font: inherit;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--title);
      background: var(--title);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .report__filters {
      font-style: italic;
      font-size: 9pt;
      color: var(--muted);
      margin: 0.25rem 0 1rem 0;
    }

    .report__narrative {
      margin: 0 0 1rem 0;
      padding: 0.75rem 1rem;
      background: #f4f7fb;
      border-left: 3px solid var(--title);
      border-radius: 0 4px 4px 0;
    }

    .section__title {
      font-size: 12pt;
      font-weight: 700;
      color: var(--title);
      margin: 1.25rem 0 0.5rem 0;
    }

    table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
    .summary-table th, .summary-table td,
    .detail-table th, .detail-table td {
      border: 1px solid var(--border);
      padding: 0.35rem 0.5rem;
      text-align: left;
      vertical-align: top;
    }
    .summary-table thead th,
    .detail-table thead th {
      background: var(--summary-head);
      color: #fff;
      font-weight: 700;
    }
    .num { text-align: center; }

    /* Facility Summary out-of-range cell */
    .oor-cell { color: var(--oor); font-weight: 700; }

    /* Detail grouping */
    .facility-group { margin-bottom: 1.5rem; }
    .facility-band {
      background: var(--facility-band);
      color: var(--title);
      font-weight: 700;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
    }
    .patient-banner {
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-top: none;
      font-size: 0.85rem;
    }
    .patient-banner.risk-high { background: var(--risk-high); }
    .patient-banner.risk-low  { background: var(--risk-low); }
    .patient-banner .pb-item { margin-right: 1rem; white-space: nowrap; }
    .patient-banner .pb-label { color: var(--muted); }
    .risk-badge {
      font-weight: 700;
      padding: 0 0.35rem;
      border-radius: 3px;
    }

    /* zebra + conditional detail cells */
    .detail-table tbody tr.zebra { background: var(--zebra); }
    .cell-inpatient { background: var(--inpatient) !important; }
    .flag-out { color: var(--oor); font-weight: 700; }
    .flag-ok  { color: var(--ok); }

    .report__empty {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 6px;
    }

    .report__footer {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media print {
      body { padding: 0; }
      .report__filterform { display: none; }
      .facility-group { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <main class="report" id="report">
    <header class="report__header">
      <h1 class="report__title">Patient Clinical Summary Report</h1>

      <!-- Interactive filter form: round-trips to the host via the query string.
           The host re-queries with these values and re-injects REPORT_DATA.
           The JS NEVER filters rows locally. -->
      <form class="report__filterform" data-filter-form>
        <label>Visit from
          <input type="date" name="fromDate" />
        </label>
        <label>Visit to
          <input type="date" name="toDate" />
        </label>
        <label>Min age
          <input type="number" name="minAge" min="0" max="120" step="1" />
        </label>
        <label>Max age
          <input type="number" name="maxAge" min="0" max="120" step="1" />
        </label>
        <button type="submit">Apply filters</button>
      </form>

      <p class="report__filters" data-filters><!-- applied-filters echo --></p>
    </header>

    <section class="report__narrative" data-narrative hidden></section>

    <section data-summary-section hidden>
      <h2 class="section__title">Facility Summary</h2>
      <table class="summary-table">
        <thead>
          <tr>
            <th scope="col">Facility</th>
            <th scope="col" class="num"># Patients</th>
            <th scope="col" class="num"># Events</th>
            <th scope="col" class="num">Avg Age</th>
            <th scope="col" class="num">Inpatient Events</th>
            <th scope="col" class="num">Out-of-range Labs</th>
          </tr>
        </thead>
        <tbody data-facility-summary></tbody>
      </table>
    </section>

    <section data-detail-section hidden>
      <h2 class="section__title">Clinical Detail by Facility, Patient and Transplant Event</h2>
      <div data-detail></div>
    </section>

    <p class="report__empty" data-empty hidden>No data available for the selected filters.</p>

    <footer class="report__footer">
      <span data-generated></span>
      <span data-executed-by></span>
    </footer>
  </main>

  <!-- REPORT_DATA -->
  <script src="patient_clinical_summary.js" defer></script>
</body>
</html>
