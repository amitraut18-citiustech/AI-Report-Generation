<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patient Clinical Summary Report</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #555;
      --border: #cfcfcf;
      --title: #1f3864;              /* report title / summary header bg */
      --detail-head: #2e5496;        /* detail column header bg */
      --facility-band: #dbe5f1;      /* facility band row bg */
      --risk-high: #f8d7da;          /* high-risk patient banner (red-subtle) */
      --risk-low: #d1e7dd;           /* normal patient banner (green-subtle) */
      --inpatient: #fff3cd;          /* inpatient setting highlight (yellow) */
      --oor: #b02a37;                /* out-of-range red */
      --ok: #0f5132;                 /* in-range green */
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--fg);
      margin: 0;
      padding: 1.5rem;
      background: #fff;
      line-height: 1.4;
    }
    .report { max-width: 1200px; margin: 0 auto; }
    .report__title {
      font-size: 18pt;
      font-weight: 700;
      color: var(--title);
      margin: 0 0 0.4rem;
    }
    .report__filters {
      color: var(--muted);
      font-size: 9pt;
      font-style: italic;
      margin: 0 0 1.2rem;
    }
    .report__narrative {
      border-left: 4px solid var(--facility-band);
      padding: 0.4rem 0.9rem;
      margin: 0 0 1.2rem;
      color: var(--muted);
    }
    .report__section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--title);
      margin: 1.4rem 0 0.6rem;
    }
    table.report__table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .report__table th, .report__table td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.55rem;
      text-align: left;
      vertical-align: top;
    }

    /* Facility Summary table */
    .summary-table thead th {
      background: var(--title);
      color: #fff;
      font-weight: 700;
      text-align: center;
    }
    .summary-table td.num { text-align: center; }
    .summary-table td.oor-hit { color: var(--oor); font-weight: 700; }

    /* Clinical Detail table */
    .detail-table thead th {
      background: var(--detail-head);
      color: #fff;
      font-weight: 700;
    }
    .detail-table .facility-band td {
      background: var(--facility-band);
      color: var(--title);
      font-weight: 700;
    }
    .detail-table .patient-banner td { font-size: 0.86rem; }
    .detail-table .patient-banner.risk-high td { background: var(--risk-high); }
    .detail-table .patient-banner.risk-low td { background: var(--risk-low); }
    .detail-table .patient-banner .risk-pill {
      display: inline-block;
      padding: 0.05rem 0.5rem;
      border-radius: 10px;
      font-weight: 700;
      border: 1px solid rgba(0,0,0,0.25);
    }
    .detail-table td.setting-inpatient { background: var(--inpatient); font-weight: 600; }
    .detail-table td.flag-out { color: var(--oor); font-weight: 700; }
    .detail-table td.flag-ok { color: var(--ok); }
    .visit-subnote { display: block; color: var(--muted); font-size: 0.75rem; }

    .report__empty {
      padding: 1rem;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 6px;
      margin-top: 1rem;
    }
    .report__footer {
      margin-top: 1.4rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    @media print {
      body { padding: 0; }
      @page { size: letter; margin: 0.5in; }
      .report__table th, .report__table td { padding: 0.28rem 0.4rem; }
      thead { display: table-header-group; }
      tr { break-inside: avoid; }
      /* keep conditional colors when printing */
      .detail-table td.setting-inpatient,
      .detail-table .patient-banner.risk-high td,
      .detail-table .patient-banner.risk-low td,
      .summary-table thead th,
      .detail-table thead th,
      .detail-table .facility-band td {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <main class="report" id="report">
    <header class="report__header">
      <h1 class="report__title">Patient Clinical Summary Report</h1>
      <p class="report__filters" data-filters></p>
    </header>

    <section class="report__narrative" data-narrative hidden></section>

    <!-- Section 1: Facility Summary -->
    <section data-section-summary hidden>
      <h2 class="report__section-title">Facility Summary</h2>
      <table class="report__table summary-table">
        <thead>
          <tr>
            <th scope="col">Facility</th>
            <th scope="col"># Patients</th>
            <th scope="col"># Events</th>
            <th scope="col">Avg Age</th>
            <th scope="col">Inpatient Events</th>
            <th scope="col">Out-of-range Labs</th>
          </tr>
        </thead>
        <tbody data-facility-summary></tbody>
      </table>
    </section>

    <!-- Section 2: Clinical Detail (nested Facility -> Patient -> Event -> Lab) -->
    <section data-section-detail hidden>
      <h2 class="report__section-title">Clinical Detail by Facility, Patient and Transplant Event</h2>
      <table class="report__table detail-table">
        <thead>
          <tr>
            <th scope="col">Event</th>
            <th scope="col">Visit Date</th>
            <th scope="col">Provider</th>
            <th scope="col">Donor</th>
            <th scope="col">Setting</th>
            <th scope="col">Test</th>
            <th scope="col">Result</th>
            <th scope="col">Reference</th>
            <th scope="col">Flag</th>
          </tr>
        </thead>
        <tbody data-detail></tbody>
      </table>
    </section>

    <p class="report__empty" data-empty hidden>No data available for the selected filters.</p>

    <footer class="report__footer">
      <span data-generated></span>
      <span data-pageinfo></span>
    </footer>
  </main>

  <!-- REPORT_DATA -->
  <script src="patient_clinical_summary.js" defer></script>
</body>
</html>
