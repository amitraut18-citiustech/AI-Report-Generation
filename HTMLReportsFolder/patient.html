<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patient Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #212529;
      background: #fff;
    }
    .report { max-width: none; margin: 0; padding: 24px 32px; }
    .report__title {
      font-size: 16pt;
      font-weight: 700;
      color: #1f3864;
      text-align: center;
      margin: 0 0 20px;
    }
    .report__table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    .report__table thead th {
      background: #212529;
      color: #fff;
      font-weight: 700;
      text-align: left;
      padding: 8px 6px;
      vertical-align: middle;
      white-space: nowrap;
    }
    .report__table tbody td {
      padding: 6px;
      vertical-align: middle;
      border-bottom: 1px solid #dee2e6;
    }
    .report__table tbody tr.row-odd  { background: #f2f2f2; }
    .report__table tbody tr.row-even { background: #fff; }
    .report__empty {
      text-align: center;
      padding: 32px 0;
      color: #6c757d;
      font-style: italic;
    }
    .report__footer {
      margin-top: 24px;
      font-size: 12px;
      color: #6c757d;
      display: flex;
      justify-content: space-between;
    }
    .report__narrative {
      margin: 16px 0;
      padding: 0;
      background: #f8f9fa;
      border: 1px solid #e2e6ea;
      border-radius: 6px;
      font-size: 13px;
      overflow: hidden;
    }
    .report__narrative-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #1f3864;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
    }
    .report__narrative-header svg { flex-shrink: 0; }
    .report__narrative-body {
      padding: 14px 16px;
      line-height: 1.6;
      color: #333;
    }
    .report__narrative-body p { margin: 0 0 8px; }
    .report__narrative-body p:last-child { margin-bottom: 0; }
    @media print {
      body { background: #fff; }
      .report { max-width: none; padding: 0; }
      .report__footer { font-size: 10px; }
      .report__table thead th { background: #212529 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .report__table tbody tr.row-odd { background: #f2f2f2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <main class="report" id="report">
    <header class="report__header">
      <h1 class="report__title">Patient Report</h1>
    </header>

    <section class="report__narrative" data-narrative hidden></section>

    <table class="report__table">
      <thead>
        <tr>
          <th scope="col">First Name</th>
          <th scope="col">Last Name</th>
          <th scope="col">Gender</th>
          <th scope="col">Date of Birth</th>
          <th scope="col">Contact Number</th>
          <th scope="col">Email</th>
          <th scope="col">Phone</th>
        </tr>
      </thead>
      <tbody data-rows></tbody>
    </table>

    <p class="report__empty" data-empty hidden>No data available.</p>

    <footer class="report__footer">
      <span data-generated></span>
      <span data-executed-by></span>
    </footer>
  </main>

  <!-- REPORT_DATA -->
  <script src="patient.js" defer></script>
</body>
</html>
